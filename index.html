<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>VR視力回復ゲーム (バグ修正・完全動作版)</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script>
    AFRAME.registerComponent('game-manager', {
      init: function () {
        this.isPlaying = false;
        this.trainingMode = false;
        this.score = 0;
        this.level = 1;
        this.hitCount = 0;
        this.targets = [];
        this.handTargets = { 'left-hand': null, 'right-hand': null, 'mouse-cursor': null };
        this.audioCtx = null;
        this.penaltyTimer = 0;

        const setupGame = () => {
          this.uiScore = document.querySelector('#ui-score');
          this.uiLevel = document.querySelector('#ui-level');
          this.uiMessage = document.querySelector('#ui-message');
          
          this.startButton = document.querySelector('#start-button');
          this.resetButton = document.querySelector('#reset-button');
          this.modeButton = document.querySelector('#mode-button');

          // --- ボタンイベント ---
          this.startButton.addEventListener('click', () => this.startGame());
          this.resetButton.addEventListener('click', () => this.resetGame());
          
          this.modeButton.addEventListener('click', () => {
            if (this.isPlaying) return; // 念のためプレイ中は無効化
            this.trainingMode = !this.trainingMode;
            this.modeButton.setAttribute('material', 'color', this.trainingMode ? '#ff9800' : '#607d8b');
            this.modeButton.querySelector('a-text').setAttribute('value', this.trainingMode ? 'TRAINING: ON' : 'TRAINING: OFF');
            
            if (this.trainingMode) {
              this.el.sceneEl.setAttribute('fog', 'type: linear; color: #0b001a; near: 2; far: 25');
            } else {
              this.el.sceneEl.removeAttribute('fog');
              this.targets.forEach(t => t.landolt.object3D.scale.set(1, 1, 1));
            }
          });

          const setHover = (btn, colorNormal, colorHover) => {
            btn.addEventListener('mouseenter', () => btn.setAttribute('material', 'color', colorHover));
            btn.addEventListener('mouseleave', () => btn.setAttribute('material', 'color', colorNormal));
          };
          setHover(this.startButton, '#4CAF50', '#81c784');
          setHover(this.resetButton, '#f44336', '#e57373');

          const laneX = [-2, 0, 2];

          // --- ターゲット生成 ---
          for(let i=0; i<3; i++) {
            let el = document.createElement('a-entity');
            el.setAttribute('visible', 'false');
            
            let hitbox = document.createElement('a-box');
            hitbox.setAttribute('width', '1.2');
            hitbox.setAttribute('height', '1.2');
            hitbox.setAttribute('depth', '0.1');
            hitbox.setAttribute('material', 'opacity: 0.1; color: #fff; transparent: true');
            hitbox.setAttribute('class', 'hitbox'); 
            
            let landolt = document.createElement('a-ring');
            landolt.setAttribute('radius-inner', '0.3');
            landolt.setAttribute('radius-outer', '0.45');
            landolt.setAttribute('color', '#ffffff');
            landolt.setAttribute('theta-start', '30');
            landolt.setAttribute('theta-length', '300');
            
            let stand = document.createElement('a-cylinder');
            stand.setAttribute('radius', '0.03');
            stand.setAttribute('height', '1.5');
            stand.setAttribute('position', '0 -0.75 0');
            stand.setAttribute('color', '#444');

            el.appendChild(hitbox);
            el.appendChild(landolt);
            el.appendChild(stand);
            this.el.sceneEl.appendChild(el);

            let targetData = { 
              el: el, landolt: landolt, stand: stand, hitbox: hitbox,
              lane: i, x: laneX[i], z: -5, dir: 0, isYellow: false,
              hoveredBy: new Set() 
            };
            this.targets.push(targetData);

            hitbox.addEventListener('mouseenter', (e) => {
              if(!this.isPlaying || !e.detail.cursorEl) return;
              let cursorId = e.detail.cursorEl.id;
              targetData.hoveredBy.add(cursorId);
              this.handTargets[cursorId] = targetData;
              hitbox.setAttribute('material', 'color: #00ffff; opacity: 0.3');
            });

            hitbox.addEventListener('mouseleave', (e) => {
              if(!this.isPlaying || !e.detail.cursorEl) return;
              let cursorId = e.detail.cursorEl.id;
              targetData.hoveredBy.delete(cursorId);
              if(this.handTargets[cursorId] === targetData) this.handTargets[cursorId] = null;
              if(targetData.hoveredBy.size === 0) hitbox.setAttribute('material', 'color: #fff; opacity: 0.1');
            });
          }

          window.addEventListener('keydown', (e) => {
            let tData = this.handTargets['mouse-cursor'];
            if(!this.isPlaying || !tData) return;
            let inputDir = -1;
            if(e.key === 'ArrowUp') inputDir = 0;
            if(e.key === 'ArrowRight') inputDir = 1;
            if(e.key === 'ArrowDown') inputDir = 2;
            if(e.key === 'ArrowLeft') inputDir = 3;
            if(inputDir !== -1) this.checkHit(inputDir, tData);
          });

          // --- VRコントローラー入力 ---
          this.hands = document.querySelectorAll('.vr-controller');
          this.hands.forEach(hand => {
            hand.stickMoved = false;
            hand.isDragging = false;
            hand.dragStartRot = { x: 0, y: 0 };
            hand.lockedTarget = null; // 【修正】スワイプ用に的をロックする変数

            hand.addEventListener('triggerdown', () => {
              let tData = this.handTargets[hand.id];
              if(tData && this.isPlaying) {
                hand.isDragging = true;
                hand.dragStartRot = { x: hand.object3D.rotation.x, y: hand.object3D.rotation.y };
                hand.lockedTarget = tData; // 【修正】トリガーを引いた瞬間の的を記憶する
              }
            });
            
            hand.addEventListener('triggerup', () => { 
              hand.isDragging = false; 
              hand.lockedTarget = null; // 離したらロック解除
            });

            hand.addEventListener('thumbstickmoved', (e) => {
              let tData = this.handTargets[hand.id];
              if(!this.isPlaying || !tData) return;
              let x = e.detail.x; let y = e.detail.y;
              if(Math.abs(x) < 0.5 && Math.abs(y) < 0.5) { hand.stickMoved = false; return; }
              if(hand.stickMoved) return;

              let inputDir = -1;
              if(y < -0.7) inputDir = 0;
              else if(x > 0.7) inputDir = 1;
              else if(y > 0.7) inputDir = 2;
              else if(x < -0.7) inputDir = 3;

              if(inputDir !== -1) {
                hand.stickMoved = true;
                this.checkHit(inputDir, tData);
              }
            });
          });
        };

        if (this.el.sceneEl.hasLoaded) setupGame();
        else this.el.sceneEl.addEventListener('loaded', setupGame);
      },

      spawnEffect: function(x, y, z, isCombo) {
        let ring = document.createElement('a-ring');
        ring.setAttribute('radius-inner', '0.5');
        ring.setAttribute('radius-outer', '0.8');
        ring.setAttribute('color', isCombo ? '#FFD700' : '#00FFFF');
        ring.setAttribute('position', `${x} ${y} ${z}`);
        ring.setAttribute('material', 'shader: flat; transparent: true; opacity: 1; side: double');
        
        ring.setAttribute('animation__scale', 'property: scale; to: 3 3 3; dur: 300; easing: easeOutQuad');
        ring.setAttribute('animation__fade', 'property: material.opacity; to: 0; dur: 300; easing: easeOutQuad');
        
        this.el.sceneEl.appendChild(ring);
        setTimeout(() => { if(ring.parentNode) ring.parentNode.removeChild(ring); }, 300);
      },

      initAudio: function() {
        if (!this.audioCtx) {
          const AudioContext = window.AudioContext || window.webkitAudioContext;
          if (AudioContext) this.audioCtx = new AudioContext();
        }
        if (this.audioCtx && this.audioCtx.state === 'suspended') this.audioCtx.resume();
      },

      playSound: function(type) {
        if (!this.audioCtx) return;
        const ctx = this.audioCtx;
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        
        if (type === 'hit') {
          osc.type = 'sine';
          osc.frequency.setValueAtTime(880, ctx.currentTime);
          osc.frequency.exponentialRampToValueAtTime(1760, ctx.currentTime + 0.1);
          gain.gain.setValueAtTime(0.4, ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
          osc.start(); osc.stop(ctx.currentTime + 0.1);
        } else if (type === 'combo') {
          osc.type = 'square';
          osc.frequency.setValueAtTime(880, ctx.currentTime);
          osc.frequency.setValueAtTime(1318.51, ctx.currentTime + 0.05);
          gain.gain.setValueAtTime(0.4, ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.2);
          osc.start(); osc.stop(ctx.currentTime + 0.2);
        } else {
          osc.type = 'sawtooth';
          osc.frequency.setValueAtTime(150, ctx.currentTime);
          osc.frequency.exponentialRampToValueAtTime(100, ctx.currentTime + 0.2);
          gain.gain.setValueAtTime(0.4, ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.2);
          osc.start(); osc.stop(ctx.currentTime + 0.2);
        }
      },

      startGame: function() {
        this.initAudio(); 
        this.isPlaying = true;
        this.score = 0; this.level = 1; this.hitCount = 0; this.penaltyTimer = 0;
        
        this.startButton.setAttribute('visible', 'false');
        this.startButton.classList.remove('clickable');
        
        // 【修正】モードボタンも隠して誤操作を防ぐ
        this.modeButton.setAttribute('visible', 'false');
        this.modeButton.classList.remove('clickable');

        this.resetButton.setAttribute('visible', 'true');
        this.resetButton.classList.add('clickable');

        this.uiMessage.setAttribute('value', 'GAME START!');
        this.uiMessage.setAttribute('color', '#00FF00');
        this.updateUI();

        this.targets.forEach((t) => {
          t.z = -3 - Math.random() * 5;
          t.el.object3D.position.set(t.x, 1.5, t.z);
          t.el.setAttribute('visible', 'true');
          t.hitbox.classList.add('clickable');
          this.randomizeDir(t);
          t.isYellow = false;
          t.stand.setAttribute('color', '#444');
          t.hitbox.setAttribute('material', 'color: #fff; opacity: 0.1');
          t.hoveredBy.clear();
        });
      },

      resetGame: function() {
        this.isPlaying = false;
        this.startButton.setAttribute('visible', 'true');
        this.startButton.classList.add('clickable');
        
        // 【修正】モードボタンを再表示
        this.modeButton.setAttribute('visible', 'true');
        this.modeButton.classList.add('clickable');

        this.resetButton.setAttribute('visible', 'false');
        this.resetButton.classList.remove('clickable');

        this.uiMessage.setAttribute('value', 'PRESS START');
        this.uiMessage.setAttribute('color', '#AAA');
        this.uiScore.setAttribute('value', 'Score: 0');
        this.uiLevel.setAttribute('value', 'Level: 1');

        this.targets.forEach(t => {
          t.el.setAttribute('visible', 'false');
          t.hitbox.classList.remove('clickable');
        });
      },

      randomizeDir: function(tData) {
        tData.dir = Math.floor(Math.random() * 4);
        let rotZ = tData.dir === 0 ? 90 : tData.dir === 1 ? 0 : tData.dir === 2 ? 270 : 180;
        tData.landolt.setAttribute('rotation', `0 0 ${rotZ}`);
      },

      checkHit: function(inputDir, tData) {
        if(tData.dir === inputDir) {
          let isCombo = tData.isYellow;
          let pushBack = isCombo ? (8 + this.level * 2) : (5 + this.level * 1);
          
          this.spawnEffect(tData.x, 1.5, tData.z, isCombo);

          tData.z = Math.max(-30, tData.z - pushBack);
          this.randomizeDir(tData);

          this.targets.forEach(t => { t.isYellow = false; t.stand.setAttribute('color', '#444'); });
          if(!isCombo) { tData.isYellow = true; tData.stand.setAttribute('color', '#aaaa00'); }

          this.uiMessage.setAttribute('value', isCombo ? 'COMBO!!' : 'HIT!');
          this.uiMessage.setAttribute('color', isCombo ? '#FFD700' : '#00FF00');
          this.playSound(isCombo ? 'combo' : 'hit');

          let sorted = [...this.targets].sort((a,b) => b.z - a.z);
          if(tData === sorted[0] || tData === sorted[1]) {
            let distanceScore = Math.floor(Math.abs(tData.z));
            this.score += isCombo ? distanceScore * 2 : distanceScore;
          }

          this.hitCount++;
          if(this.hitCount >= 10) { this.level++; this.hitCount = 0; }
        } else {
          tData.isYellow = false;
          tData.stand.setAttribute('color', '#444');
          this.uiMessage.setAttribute('value', 'MISS...');
          this.uiMessage.setAttribute('color', '#FF0000');
          this.playSound('miss');
        }
        
        this.updateUI();
        tData.el.object3D.position.z = tData.z;
      },

      updateUI: function() {
        this.uiScore.setAttribute('value', `Score: ${this.score}`);
        this.uiLevel.setAttribute('value', `Level: ${this.level}`);
      },

      tick: function (time, timeDelta) {
        if (!this.isPlaying) return;

        // フリック操作判定
        if(this.hands) {
          this.hands.forEach(hand => {
            if(hand.isDragging && hand.lockedTarget) { // 【修正】ロックした的を使用する
              let cx = hand.object3D.rotation.x; 
              let cy = hand.object3D.rotation.y; 
              
              let dx = cy - hand.dragStartRot.y;
              let dy = cx - hand.dragStartRot.x;
              
              if (dx > Math.PI) dx -= Math.PI*2; if (dx < -Math.PI) dx += Math.PI*2;
              if (dy > Math.PI) dy -= Math.PI*2; if (dy < -Math.PI) dy += Math.PI*2;

              let threshold = 0.2; 
              if(Math.abs(dx) > threshold || Math.abs(dy) > threshold) {
                let inputDir = -1;
                if(Math.abs(dx) > Math.abs(dy)) {
                  inputDir = dx < 0 ? 1 : 3; 
                } else {
                  inputDir = dy > 0 ? 0 : 2; 
                }
                
                // ロックした的を押し返す
                this.checkHit(inputDir, hand.lockedTarget);
                hand.isDragging = false; 
                hand.lockedTarget = null;
              }
            }
          });
        }

        let speed = (0.02 + this.level * 0.005) * (timeDelta / 16);
        let anyAtFront = false;

        this.targets.forEach(t => {
          t.z += speed;
          if(t.z >= -1.5) { t.z = -1.5; anyAtFront = true; }
          t.el.object3D.position.z = t.z;

          if (this.trainingMode) {
            let s = 0.5 + 0.5 * (1.0 - Math.abs(t.z) / 30.0);
            t.landolt.object3D.scale.set(s, s, s);
          }
        });

        if(anyAtFront) {
          this.penaltyTimer += timeDelta;
          if(this.penaltyTimer > 1500 && this.level > 1) {
            this.level--; this.penaltyTimer = 0; this.updateUI();
          }
        } else {
          this.penaltyTimer = 0; 
        }
      }
    });
  </script>
</head>
<body style="margin: 0; overflow: hidden; background-color: #000;">
  <a-scene game-manager background="color: #050510">
    <a-entity position="0 0 0">
      <a-camera position="0 1.6 0">
        <a-entity id="mouse-cursor" cursor="rayOrigin: mouse; fuse: false" raycaster="objects: .clickable"></a-entity>
      </a-camera>
      <a-entity id="left-hand" class="vr-controller" laser-controls="hand: left" raycaster="objects: .clickable; showLine: true"></a-entity>
      <a-entity id="right-hand" class="vr-controller" laser-controls="hand: right" raycaster="objects: .clickable; showLine: true"></a-entity>
    </a-entity>

    <a-entity id="controls-panel" position="-3.5 2.5 -3" rotation="0 25 0" geometry="primitive: plane; width: 2.5; height: 2.2" material="color: #111; opacity: 0.9; side: double">
      <a-text value="[ HOW TO PLAY ]\n\n- PC -\nAim: Mouse\nInput: Arrow Keys\n\n- VR -\nAim: Laser Pointer\nInput: Thumbstick\n    OR\nPull Trigger & Swipe\n\n1. Aim & Input Direction\n2. Push it back!" 
              position="-1.1 0.8 0.01" align="left" color="#0ff" width="2.3" line-height="55"></a-text>
    </a-entity>

    <a-entity id="world-ui" position="0 3.5 -4">
      <a-text id="ui-score" value="Score: 0" position="-1.5 0 0" color="#FFD700" width="5"></a-text>
      <a-text id="ui-level" value="Level: 1" position="1.5 0 0" color="#FFF" width="5"></a-text>
      <a-text id="ui-message" value="PRESS START" position="0 -0.5 0" align="center" color="#AAA" width="6"></a-text>
    </a-entity>

    <a-entity id="start-button" class="clickable" position="0 1.5 -3" geometry="primitive: plane; width: 1.5; height: 0.6" material="color: #4CAF50">
      <a-text value="START" align="center" position="0 0 0.01" width="5" color="#FFF"></a-text>
    </a-entity>

    <a-entity id="mode-button" class="clickable" position="0 2.3 -3" geometry="primitive: plane; width: 2.0; height: 0.4" material="color: #607d8b">
      <a-text value="TRAINING: OFF" align="center" position="0 0 0.01" width="4" color="#FFF"></a-text>
    </a-entity>

    <a-entity id="reset-button" position="3.5 1.5 -3" rotation="0 -25 0" geometry="primitive: plane; width: 1.5; height: 0.6" material="color: #f44336" visible="false">
      <a-text value="RESET" align="center" position="0 0 0.01" width="5" color="#FFF"></a-text>
    </a-entity>

    <a-entity position="0 0.01 -15" rotation="-90 0 0" geometry="primitive: plane; width: 40; height: 60" material="color: #00ffff; wireframe: true; transparent: true; opacity: 0.1"></a-entity>
    
    <a-entity position="-2 0.02 -15" rotation="-90 0 0" geometry="primitive: plane; width: 0.1; height: 32" material="color: #0ff; opacity: 0.5"></a-entity>
    <a-entity position="0 0.02 -15" rotation="-90 0 0" geometry="primitive: plane; width: 0.1; height: 32" material="color: #0ff; opacity: 0.5"></a-entity>
    <a-entity position="2 0.02 -15" rotation="-90 0 0" geometry="primitive: plane; width: 0.1; height: 32" material="color: #0ff; opacity: 0.5"></a-entity>

    <a-light type="ambient" color="#444"></a-light>
    <a-light type="point" intensity="0.8" color="#0ff" position="0 4 0"></a-light>
  </a-scene>
</body>
</html>
