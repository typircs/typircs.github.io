<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>VR視力回復ゲーム (WebXR版 - Beat Recovery Zen)</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script>
    AFRAME.registerComponent('data-particles', {
      init: function() {
        for(let i=0; i<40; i++) {
          let p = document.createElement('a-box');
          let x = (Math.random() - 0.5) * 30; 
          let y = Math.random() * 8;          
          let z = -2 - Math.random() * 35;    
          p.setAttribute('position', `${x} ${y} ${z}`);
          p.setAttribute('scale', '0.08 0.08 0.08');
          // 昼間の背景に合わせてパーティクルの色も白や水色に
          let color = Math.random() > 0.5 ? '#ffffff' : '#88ddff';
          p.setAttribute('material', `color: ${color}; shader: flat; transparent: true; opacity: 0.6`);
          p.setAttribute('animation', `property: position; to: ${x} ${y+2} ${z}; dur: ${3000+Math.random()*4000}; loop: true; dir: alternate; easing: easeInOutSine`);
          this.el.appendChild(p);
        }
      }
    });

    AFRAME.registerComponent('game-manager', {
      init: function () {
        this.isPlaying = false;
        this.trainingMode = false; // サイズ変動機能のオンオフ
        this.score = 0;
        this.level = 1;
        this.hitCount = 0;
        this.targets = [];
        this.handTargets = { 'left-hand': null, 'right-hand': null, 'mouse-cursor': null };
        this.audioCtx = null;
        this.penaltyTimer = 0;

        const setupGame = () => {
          this.uiScore = document.querySelector('#ui-score');
          this.uiLevel = document.querySelector('#ui-level');
          this.uiMessage = document.querySelector('#ui-message');
          
          this.startButton = document.querySelector('#start-button');
          this.resetButton = document.querySelector('#reset-button');
          this.modeButton = document.querySelector('#mode-button'); // 【追加】モード切替ボタン

          // --- ボタンイベント ---
          this.startButton.addEventListener('click', () => this.startGame());
          this.resetButton.addEventListener('click', () => this.resetGame());
          
          this.modeButton.addEventListener('click', () => {
            if (this.isPlaying) return; // 念のためプレイ中は無効化
            this.trainingMode = !this.trainingMode;
            this.modeButton.setAttribute('material', 'color', this.trainingMode ? '#ff9800' : '#607d8b');
            this.modeButton.querySelector('a-text').setAttribute('value', this.trainingMode ? 'SIZE VAR: ON' : 'SIZE VAR: OFF');
            
            // 【変更】トレーニングモードオフ時は、今の基準サイズ（半分になったサイズ）に戻す
            if (!this.trainingMode) {
              this.targets.forEach(t => t.landoltGroup.object3D.scale.set(0.35, 0.35, 0.35));
            }
          });

          // ボタンホバー演出
          const setHover = (btn, colorNormal, colorHover) => {
            btn.addEventListener('mouseenter', () => btn.setAttribute('material', 'color', colorHover));
            btn.addEventListener('mouseleave', () => btn.setAttribute('material', 'color', colorNormal));
          };
          setHover(this.startButton, '#4CAF50', '#81c784');
          setHover(this.resetButton, '#f44336', '#e57373');

          const laneX = [-2, 0, 2];

          // --- ターゲット生成 ---
          for(let i=0; i<3; i++) {
            let el = document.createElement('a-entity');
            el.setAttribute('visible', 'false');
            
            let hitbox = document.createElement('a-box');
            hitbox.setAttribute('width', '1.2'); hitbox.setAttribute('height', '1.2'); hitbox.setAttribute('depth', '0.1');
            hitbox.setAttribute('material', 'opacity: 0.1; color: #fff; transparent: true');
            hitbox.setAttribute('class', 'hitbox'); 
            
            // ランドルト環と背景板をまとめるグループ
            let landoltGroup = document.createElement('a-entity');
            // 【変更】基準スケールを以前の半分に（0.7 -> 0.35）
            landoltGroup.setAttribute('scale', '0.35 0.35 0.35'); 
            
            // 環の背後に置く「不透明の黒い円（下地）」
            let bgCircle = document.createElement('a-circle');
            // 【変更】半径を以前の半分に（0.52 -> 0.26）
            bgCircle.setAttribute('radius', '0.7'); 
            bgCircle.setAttribute('color', '#111111'); // ほぼ黒
            bgCircle.setAttribute('material', 'shader: flat; depthTest: true'); // 深度テスト有効
            bgCircle.setAttribute('position', '0 0 -0.05'); // 環のほんの少し後ろ

            let landolt = document.createElement('a-ring');
            // 【変更】内径・外径を以前の半分に（0.3/0.45 -> 0.15/0.225）
            landolt.setAttribute('radius-inner', '0.15'); landolt.setAttribute('radius-outer', '0.225');
            // 昼背景に合わせて、環の色を真っ白に
            landolt.setAttribute('color', '#ffffff');
            landolt.setAttribute('material', 'shader: flat'); 
            landolt.setAttribute('theta-start', '30'); landolt.setAttribute('theta-length', '300');
            
            let stand = document.createElement('a-cylinder');
            stand.setAttribute('radius', '0.03'); stand.setAttribute('height', '1.5');
            // 【変更】棒の位置を環より後ろ（Z=-0.15）にする
            stand.setAttribute('position', '0 -0.75 -0.15'); 
            // 昼背景に合わせて、棒の色をグレーに
            stand.setAttribute('color', '#555555');

            // グループに背景円と環を追加
            landoltGroup.appendChild(bgCircle);
            landoltGroup.appendChild(landolt);

            el.appendChild(hitbox); 
            el.appendChild(landoltGroup); 
            el.appendChild(stand);
            this.el.sceneEl.appendChild(el);

            let targetData = { 
              el: el, landoltGroup: landoltGroup, landolt: landolt, stand: stand, hitbox: hitbox,
              lane: i, x: laneX[i], z: -5, dir: 0, isYellow: false,
              hoveredBy: new Set() 
            };
            this.targets.push(targetData);

            hitbox.addEventListener('mouseenter', (e) => {
              if(!this.isPlaying || !e.detail.cursorEl) return;
              let cursorId = e.detail.cursorEl.id;
              targetData.hoveredBy.add(cursorId);
              this.handTargets[cursorId] = targetData;
              // ホバー時の色も昼間用に濃いシアンに
              hitbox.setAttribute('material', 'color: #00dddd; opacity: 0.4');
            });

            hitbox.addEventListener('mouseleave', (e) => {
              if(!this.isPlaying || !e.detail.cursorEl) return;
              let cursorId = e.detail.cursorEl.id;
              targetData.hoveredBy.delete(cursorId);
              if(this.handTargets[cursorId] === targetData) this.handTargets[cursorId] = null;
              if(targetData.hoveredBy.size === 0) hitbox.setAttribute('material', 'color: #fff; opacity: 0.1');
            });
          }

          window.addEventListener('keydown', (e) => {
            let tData = this.handTargets['mouse-cursor'];
            if(!this.isPlaying || !tData) return;
            let inputDir = -1;
            if(e.key === 'ArrowUp') inputDir = 0; if(e.key === 'ArrowRight') inputDir = 1;
            if(e.key === 'ArrowDown') inputDir = 2; if(e.key === 'ArrowLeft') inputDir = 3;
            if(inputDir !== -1) this.checkHit(inputDir, tData);
          });

          // VRコントローラー入力 (そのまま維持)
          this.hands = document.querySelectorAll('.vr-controller');
          this.hands.forEach(hand => {
            hand.prevRot = null; // 前フレームの回転を記録
            hand.swinging = false; // 振りの状態管理
            hand.lastSwingTime = 0; // 連続入力防止

            // スティック入力は残す
            hand.addEventListener('thumbstickmoved', (e) => {
              let tData = this.handTargets[hand.id]; // エイム中の的を取得
              if(!this.isPlaying || !tData) return;
              let x = e.detail.x; let y = e.detail.y;
              if(Math.abs(x) < 0.5 && Math.abs(y) < 0.5) { hand.stickMoved = false; return; }
              if(hand.stickMoved) return;
              let inputDir = -1;
              if(y < -0.7) inputDir = 0; else if(x > 0.7) inputDir = 1; else if(y > 0.7) inputDir = 2; else if(x < -0.7) inputDir = 3;
              if(inputDir !== -1) { hand.stickMoved = true; this.checkHit(inputDir, tData); }
            });
          });
        };

        if (this.el.sceneEl.hasLoaded) setupGame();
        else this.el.sceneEl.addEventListener('loaded', setupGame);
      },

      spawnEffect: function(x, y, z, isCombo) {
        let ring = document.createElement('a-ring');
        ring.setAttribute('radius-inner', '0.5'); ring.setAttribute('radius-outer', '0.8');
        // 昼背景に負けないよう、エフェクト色を少し濃く調整
        ring.setAttribute('color', isCombo ? '#FFaa00' : '#00aaff');
        ring.setAttribute('position', `${x} ${y} ${z}`);
        ring.setAttribute('material', 'shader: flat; transparent: true; opacity: 1; side: double');
        ring.setAttribute('animation__scale', 'property: scale; to: 3 3 3; dur: 300; easing: easeOutQuad');
        ring.setAttribute('animation__fade', 'property: material.opacity; to: 0; dur: 300; easing: easeOutQuad');
        this.el.sceneEl.appendChild(ring);
        setTimeout(() => { if(ring.parentNode) ring.parentNode.removeChild(ring); }, 300);
      },

      // 合成音による効果音生成 (そのまま)
      initAudio: function() {
        if (!this.audioCtx) {
          const AudioContext = window.AudioContext || window.webkitAudioContext;
          if (AudioContext) this.audioCtx = new AudioContext();
        }
        if (this.audioCtx && this.audioCtx.state === 'suspended') this.audioCtx.resume();
      },

      playSound: function(type) {
        if (!this.audioCtx) return;
        const ctx = this.audioCtx; const osc = ctx.createOscillator(); const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        if (type === 'hit') {
          osc.type = 'sine'; osc.frequency.setValueAtTime(880, ctx.currentTime);
          osc.frequency.exponentialRampToValueAtTime(1760, ctx.currentTime + 0.1);
          gain.gain.setValueAtTime(0.4, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
          osc.start(); osc.stop(ctx.currentTime + 0.1);
        } else if (type === 'combo') {
          osc.type = 'square'; osc.frequency.setValueAtTime(880, ctx.currentTime);
          osc.frequency.setValueAtTime(1318.51, ctx.currentTime + 0.05);
          gain.gain.setValueAtTime(0.4, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.2);
          osc.start(); osc.stop(ctx.currentTime + 0.2);
        } else {
          osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, ctx.currentTime);
          osc.frequency.exponentialRampToValueAtTime(100, ctx.currentTime + 0.2);
          gain.gain.setValueAtTime(0.4, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.2);
          osc.start(); osc.stop(ctx.currentTime + 0.2);
        }
      },

      startGame: function() {
        this.initAudio(); 
        this.isPlaying = true; this.score = 0; this.level = 1; this.hitCount = 0; this.penaltyTimer = 0;
        
        this.startButton.setAttribute('visible', 'false'); this.startButton.classList.remove('clickable');
        this.modeButton.setAttribute('visible', 'false'); this.modeButton.classList.remove('clickable');
        this.resetButton.setAttribute('visible', 'true'); this.resetButton.classList.add('clickable');

        this.uiMessage.setAttribute('value', 'GAME START!'); this.uiMessage.setAttribute('color', '#00aa00');
        this.updateUI();

        this.targets.forEach((t) => {
          t.z = -3 - Math.random() * 5; t.el.object3D.position.set(t.x, 1.5, t.z);
          t.el.setAttribute('visible', 'true'); t.hitbox.classList.add('clickable');
          this.randomizeDir(t); t.isYellow = false; t.stand.setAttribute('color', '#555');
          t.hitbox.setAttribute('material', 'color: #fff; opacity: 0.1');
          t.hoveredBy.clear();
        });
        
        // フォグ削除
        this.el.sceneEl.removeAttribute('fog');
        // 【変更】スケールを新しい基準サイズ（以前の半分）に
        this.targets.forEach(t => t.landoltGroup.object3D.scale.set(0.35, 0.35, 0.35));
      },

      resetGame: function() {
        this.isPlaying = false;
        this.startButton.setAttribute('visible', 'true'); this.startButton.classList.add('clickable');
        this.modeButton.setAttribute('visible', 'true'); this.modeButton.classList.add('clickable');
        this.resetButton.setAttribute('visible', 'false'); this.resetButton.classList.remove('clickable');

        this.uiMessage.setAttribute('value', 'PRESS START'); this.uiMessage.setAttribute('color', '#333');
        this.uiScore.setAttribute('value', 'Score: 0'); this.uiLevel.setAttribute('value', 'Level: 1');

        this.targets.forEach(t => { t.el.setAttribute('visible', 'false'); t.hitbox.classList.remove('clickable'); });
        
        // フォグ削除
        this.el.sceneEl.removeAttribute('fog');
        // 【変更】スケールを新しい基準サイズ（以前の半分）に戻す
        this.targets.forEach(t => t.landoltGroup.object3D.scale.set(0.35, 0.35, 0.35));
      },

      randomizeDir: function(tData) {
        tData.dir = Math.floor(Math.random() * 4);
        let rotZ = tData.dir === 0 ? 90 : tData.dir === 1 ? 0 : tData.dir === 2 ? 270 : 180;
        // 回転させるのは環本体のみ
        tData.landolt.setAttribute('rotation', `0 0 ${rotZ}`);
      },

      checkHit: function(inputDir, tData) {
        if(tData.dir === inputDir) {
          let isCombo = tData.isYellow;
          let pushBack = isCombo ? (8 + this.level * 2) : (5 + this.level * 1);
          
          this.spawnEffect(tData.x, 1.5, tData.z, isCombo);
          tData.z = Math.max(-30, tData.z - pushBack);
          this.randomizeDir(tData);

          this.targets.forEach(t => { t.isYellow = false; t.stand.setAttribute('color', '#555'); });
          if(!isCombo) { tData.isYellow = true; tData.stand.setAttribute('color', '#ffaa00'); }

          this.uiMessage.setAttribute('value', isCombo ? 'COMBO!!' : 'HIT!'); this.uiMessage.setAttribute('color', isCombo ? '#ffaa00' : '#00aa00');
          this.playSound(isCombo ? 'combo' : 'hit');

          let sorted = [...this.targets].sort((a,b) => b.z - a.z);
          if(tData === sorted[0] || tData === sorted[1]) {
            let distanceScore = Math.floor(Math.abs(tData.z));
            this.score += isCombo ? distanceScore * 2 : distanceScore;
          }
          this.hitCount++; if(this.hitCount >= 10) { this.level++; this.hitCount = 0; }
        } else {
          tData.isYellow = false; tData.stand.setAttribute('color', '#555');
          this.uiMessage.setAttribute('value', 'MISS...'); this.uiMessage.setAttribute('color', '#FF0000');
          this.playSound('miss');
        }
        
        this.updateUI();
        tData.el.object3D.position.z = tData.z;
      },

      updateUI: function() {
        this.uiScore.setAttribute('value', `Score: ${this.score}`);
        this.uiLevel.setAttribute('value', `Level: ${this.level}`);
      },

      tick: function (time, timeDelta) {
        if (!this.isPlaying) return;

        // トリガー不要、振るだけスワイプ操作判定 (維持)
        if(this.hands) {
          this.hands.forEach(hand => {
            let tData = this.handTargets[hand.id]; // エイム中の的を取得

            if(tData && hand.object3D) {
              // 振りの速さ（角速度）を算出
              let currentRot = hand.object3D.rotation;
              if (hand.prevRot) {
                let dx = currentRot.x - hand.prevRot.x; // ピッチ（上下）
                let dy = currentRot.y - hand.prevRot.y; // ヨー（左右）
                
                // 角度の回り込み補正
                if (dx > Math.PI) dx -= Math.PI*2; if (dx < -Math.PI) dx += Math.PI*2;
                if (dy > Math.PI) dy -= Math.PI*2; if (dy < -Math.PI) dy += Math.PI*2;

                let threshold = 0.08; // 振りの速さの閾値 (ラジアン/フレーム)
                let currentSwingSpeed = Math.abs(dx) + Math.abs(dy); // 簡易的な振りの強さ
                
                if(!hand.swinging) {
                  // 前回のSwingから一定時間経過、かつ閾値を超えたか判定
                  let swingCoolDown = 200; // ms
                  if(currentSwingSpeed > threshold && (time - hand.lastSwingTime > swingCoolDown)) {
                    // 振りの方向を決定
                    let inputDir = -1;
                    if(Math.abs(dx) > Math.abs(dy)) {
                      // 上下振り
                      inputDir = dx > 0 ? 0 : 2; // 上(0) / 下(2)
                    } else {
                      // 左右振り
                      inputDir = dy < 0 ? 1 : 3; // 右(1) / 左(3)
                    }
                    
                    // 的を押し返す
                    this.checkHit(inputDir, tData);
                    hand.swinging = true; // 振りの状態管理
                    hand.lastSwingTime = time; // 入力時間を更新
                  }
                } else {
                  // 振りが弱まってきたら再入力可能にする
                  if (currentSwingSpeed < threshold * 0.5) {
                    hand.swinging = false;
                  }
                }
              }
              // 前フレームの回転を更新
              hand.prevRot = { x: currentRot.x, y: currentRot.y };
            } else {
              // 的を狙っていない時は変数をリセット
              hand.swinging = false;
              hand.prevRot = null;
            }
          });
        }

        let speed = (0.02 + this.level * 0.005) * (timeDelta / 16);
        let anyAtFront = false;

        this.targets.forEach(t => {
          t.z += speed;
          if(t.z >= -1.5) { t.z = -1.5; anyAtFront = true; }
          t.el.object3D.position.z = t.z;

          if (this.trainingMode) {
            // 【変更】スケールの変動範囲も、基準サイズ（0.35）をベースに今の半分に
            // 手前で最大0.35、奥で最小0.175程度に変動させる
            let s = 0.175 + 0.175 * (1.0 - Math.abs(t.z) / 30.0);
            t.landoltGroup.object3D.scale.set(s, s, s);
          }
        });

        if(anyAtFront) {
          this.penaltyTimer += timeDelta;
          if(this.penaltyTimer > 1500 && this.level > 1) {
            this.level--; this.penaltyTimer = 0; this.updateUI();
          }
        } else {
          this.penaltyTimer = 0; 
        }
      }
    });
  </script>
</head>
<body style="margin: 0; overflow: hidden; background-color: #F8E0A0;">
  <a-scene game-manager data-particles background="color: #F8E0A0">
    
    <a-entity position="0 0 0">
      <a-camera position="0 1.6 0">
        <a-entity id="mouse-cursor" cursor="rayOrigin: mouse; fuse: false" raycaster="objects: .clickable"></a-entity>
      </a-camera>
      <a-entity id="left-hand" class="vr-controller" laser-controls="hand: left" raycaster="objects: .clickable; showLine: true"></a-entity>
      <a-entity id="right-hand" class="vr-controller" laser-controls="hand: right" raycaster="objects: .clickable; showLine: true"></a-entity>
    </a-entity>

    <a-entity id="controls-panel" position="-3.5 2.5 -3" rotation="0 25 0" geometry="primitive: plane; width: 2.5; height: 2.2" material="color: #333; opacity: 0.85; side: double">
      <a-text value="[ HOW TO PLAY ]\n\n- PC -\nAim: Mouse\nInput: Arrow Keys\n\n- VR -\nAim: Laser Pointer\nInput: Thumbstick\n    OR\nAim & Swing (like Beat Saber)\n\n1. Aim & Input Direction\n2. Push it back!" 
              position="-1.1 0.8 0.01" align="left" color="#eee" width="2.3" line-height="55"></a-text>
    </a-entity>

    <a-entity id="world-ui" position="0 3.5 -4">
      <a-text id="ui-score" value="Score: 0" position="-1.5 0 0" color="#e65100" width="5"></a-text>
      <a-text id="ui-level" value="Level: 1" position="1.5 0 0" color="#333" width="5"></a-text>
      <a-text id="ui-message" value="PRESS START" position="0 -0.5 0" align="center" color="#333" width="6"></a-text>
    </a-entity>

    <a-entity id="start-button" class="clickable" position="0 1.5 -3" geometry="primitive: plane; width: 1.5; height: 0.6" material="color: #4CAF50">
      <a-text value="START" align="center" position="0 0 0.01" width="5" color="#FFF"></a-text>
    </a-entity>

    <a-entity id="mode-button" class="clickable" position="0 2.3 -3" geometry="primitive: plane; width: 2.0; height: 0.4" material="color: #607d8b">
      <a-text value="SIZE VAR: OFF" align="center" position="0 0 0.01" width="4" color="#FFF"></a-text>
    </a-entity>

    <a-entity id="reset-button" position="3.5 1.5 -3" rotation="0 -25 0" geometry="primitive: plane; width: 1.5; height: 0.6" material="color: #f44336" visible="false">
      <a-text value="RESET" align="center" position="0 0 0.01" width="5" color="#FFF"></a-text>
    </a-entity>

    <a-entity rotation="-90 0 0" position="0 0.01 -20">
      <a-plane width="60" height="120" segments-width="30" segments-height="60"
               material="color: #ffffff; wireframe: true; transparent: true; opacity: 0.5"
               animation="property: position; from: 0 0 0; to: 0 -2 0; dur: 800; loop: true; easing: linear"></a-plane>
    </a-entity>
    
    <a-entity position="-2 0.05 -20" rotation="-90 0 0" geometry="primitive: plane; width: 0.1; height: 40" material="color: #ffffff; shader: flat; transparent: true; opacity: 0.6"></a-entity>
    <a-entity position="0 0.05 -20" rotation="-90 0 0" geometry="primitive: plane; width: 0.1; height: 40" material="color: #ffffff; shader: flat; transparent: true; opacity: 0.6"></a-entity>
    <a-entity position="2 0.05 -20" rotation="-90 0 0" geometry="primitive: plane; width: 0.1; height: 40" material="color: #ffffff; shader: flat; transparent: true; opacity: 0.6"></a-entity>

    <a-torus radius="6" radius-tubular="0.05" arc="180" position="0 0 -10" material="color: #A52A2A; shader: flat; transparent: true; opacity: 0.5"></a-torus>
    <a-torus radius="6" radius-tubular="0.05" arc="180" position="0 0 -20" material="color: #8B4513; shader: flat; transparent: true; opacity: 0.5"></a-torus>
    <a-torus radius="6" radius-tubular="0.05" arc="180" position="0 0 -30" material="color: #A52A2A; shader: flat; transparent: true; opacity: 0.5"></a-torus>
    <a-torus radius="6" radius-tubular="0.05" arc="180" position="0 0 -40" material="color: #8B4513; shader: flat; transparent: true; opacity: 0.5"></a-torus>

    <a-entity position="0 2 -50" geometry="primitive: cone; radiusBottom: 25; height: 8; segmentsRadial: 4" material="color: #696969; opacity: 0.9; shader: flat; transparent: true" 
              animation="property: scale; to: 1.05 1.05 1.05; dur: 2000; loop: true; dir: alternate; easing: easeInOutSine"></a-entity>
    
    <a-circle radius="15" position="0 3 -50" material="color: #FFA500; shader: flat; transparent: true; opacity: 0.9"></a-circle>
