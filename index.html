<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>VR視力回復ゲーム (WebXR版 - バグ修正＆最適化済み)</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script>
    AFRAME.registerComponent('game-manager', {
      init: function () {
        this.isPlaying = false;
        this.score = 0;
        this.level = 1;
        this.hitCount = 0;
        this.targets = [];
        this.selectedTarget = null;
        
        // 【修正1】AudioContextを使い回すための変数を準備
        this.audioCtx = null;
        this.penaltyTimer = 0; // ペナルティ用のタイマー

        const setupGame = () => {
          this.uiScore = document.querySelector('#ui-score');
          this.uiLevel = document.querySelector('#ui-level');
          this.uiMessage = document.querySelector('#ui-message');
          this.startButton = document.querySelector('#start-button');
          this.resetButton = document.querySelector('#reset-button');

          this.startButton.addEventListener('click', () => this.startGame());
          this.resetButton.addEventListener('click', () => this.resetGame());

          this.startButton.addEventListener('mouseenter', () => {
            if(!this.isPlaying) this.startButton.setAttribute('material', 'color: #81c784');
          });
          this.startButton.addEventListener('mouseleave', () => {
            this.startButton.setAttribute('material', 'color: #4CAF50');
          });

          this.resetButton.addEventListener('mouseenter', () => {
            if(this.isPlaying) this.resetButton.setAttribute('material', 'color: #e57373');
          });
          this.resetButton.addEventListener('mouseleave', () => {
            this.resetButton.setAttribute('material', 'color: #f44336');
          });

          const laneX = [-2, 0, 2];

          for(let i=0; i<3; i++) {
            let el = document.createElement('a-entity');
            el.setAttribute('visible', 'false');
            
            let hitbox = document.createElement('a-box');
            hitbox.setAttribute('width', '1.2');
            hitbox.setAttribute('height', '1.2');
            hitbox.setAttribute('depth', '0.1');
            hitbox.setAttribute('material', 'opacity: 0.1; color: #fff');
            hitbox.setAttribute('class', 'hitbox'); 
            
            let landolt = document.createElement('a-ring');
            landolt.setAttribute('radius-inner', '0.3');
            landolt.setAttribute('radius-outer', '0.45');
            landolt.setAttribute('color', '#ffffff');
            landolt.setAttribute('theta-start', '30');
            landolt.setAttribute('theta-length', '300');
            
            let stand = document.createElement('a-cylinder');
            stand.setAttribute('radius', '0.05');
            stand.setAttribute('height', '1.5');
            stand.setAttribute('position', '0 -0.75 0');
            stand.setAttribute('color', '#333333');

            el.appendChild(hitbox);
            el.appendChild(landolt);
            el.appendChild(stand);
            this.el.sceneEl.appendChild(el);

            let targetData = { 
              el: el, landolt: landolt, stand: stand, hitbox: hitbox,
              lane: i, x: laneX[i], z: -5, dir: 0, isYellow: false 
            };
            this.targets.push(targetData);

            hitbox.addEventListener('mouseenter', () => {
              if(!this.isPlaying) return;
              hitbox.setAttribute('material', 'color: #00ffff; opacity: 0.4');
              this.selectedTarget = targetData;
            });
            hitbox.addEventListener('mouseleave', () => {
              if(!this.isPlaying) return;
              hitbox.setAttribute('material', 'color: #fff; opacity: 0.1');
              if(this.selectedTarget === targetData) this.selectedTarget = null;
            });
          }

          window.addEventListener('keydown', (e) => {
            if(!this.isPlaying || !this.selectedTarget) return;
            let inputDir = -1;
            if(e.key === 'ArrowUp') inputDir = 0;
            if(e.key === 'ArrowRight') inputDir = 1;
            if(e.key === 'ArrowDown') inputDir = 2;
            if(e.key === 'ArrowLeft') inputDir = 3;
            if(inputDir !== -1) this.checkHit(inputDir);
          });

          this.stickMoved = false;
          const hands = document.querySelectorAll('.vr-controller');
          hands.forEach(hand => {
            hand.addEventListener('thumbstickmoved', (e) => {
              if(!this.isPlaying || !this.selectedTarget) return;
              let x = e.detail.x;
              let y = e.detail.y;
              
              if(Math.abs(x) < 0.5 && Math.abs(y) < 0.5) {
                this.stickMoved = false; 
                return;
              }
              if(this.stickMoved) return;

              let inputDir = -1;
              if(y < -0.7) inputDir = 0;
              else if(x > 0.7) inputDir = 1;
              else if(y > 0.7) inputDir = 2;
              else if(x < -0.7) inputDir = 3;

              if(inputDir !== -1) {
                this.stickMoved = true;
                this.checkHit(inputDir);
              }
            });
          });
        };

        if (this.el.sceneEl.hasLoaded) setupGame();
        else this.el.sceneEl.addEventListener('loaded', setupGame);
      },

      initAudio: function() {
        if (!this.audioCtx) {
          const AudioContext = window.AudioContext || window.webkitAudioContext;
          if (AudioContext) this.audioCtx = new AudioContext();
        }
        if (this.audioCtx && this.audioCtx.state === 'suspended') {
          this.audioCtx.resume();
        }
      },

      playSound: function(type) {
        if (!this.audioCtx) return;
        const ctx = this.audioCtx;
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        
        if (type === 'hit') {
          osc.type = 'sine';
          osc.frequency.setValueAtTime(880, ctx.currentTime);
          osc.frequency.exponentialRampToValueAtTime(1760, ctx.currentTime + 0.1);
          gain.gain.setValueAtTime(0.3, ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
          osc.start();
          osc.stop(ctx.currentTime + 0.1);
        } else if (type === 'combo') {
          osc.type = 'square';
          osc.frequency.setValueAtTime(880, ctx.currentTime);
          osc.frequency.setValueAtTime(1318.51, ctx.currentTime + 0.05);
          gain.gain.setValueAtTime(0.3, ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.2);
          osc.start();
          osc.stop(ctx.currentTime + 0.2);
        } else { // miss
          osc.type = 'sawtooth';
          osc.frequency.setValueAtTime(150, ctx.currentTime);
          osc.frequency.exponentialRampToValueAtTime(100, ctx.currentTime + 0.2);
          gain.gain.setValueAtTime(0.3, ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.2);
          osc.start();
          osc.stop(ctx.currentTime + 0.2);
        }
      },

      startGame: function() {
        this.initAudio(); // ユーザーのクリックをトリガーにAudioContextを有効化
        
        this.isPlaying = true;
        this.score = 0;
        this.level = 1;
        this.hitCount = 0;
        this.penaltyTimer = 0;
        
        this.startButton.setAttribute('visible', 'false');
        this.startButton.classList.remove('clickable');
        
        this.resetButton.setAttribute('visible', 'true');
        this.resetButton.classList.add('clickable');

        this.uiMessage.setAttribute('value', 'GAME START!');
        this.uiMessage.setAttribute('color', '#00FF00');
        this.updateUI();

        this.targets.forEach((t) => {
          t.z = -3 - Math.random() * 5;
          // 【修正2】オブジェクトのプロパティを直接書き換える（軽量化）
          t.el.object3D.position.set(t.x, 1.5, t.z);
          t.el.setAttribute('visible', 'true');
          t.hitbox.classList.add('clickable');
          this.randomizeDir(t);
          t.isYellow = false;
          t.stand.setAttribute('color', '#333333');
          t.hitbox.setAttribute('material', 'color: #fff; opacity: 0.1');
        });
        this.selectedTarget = null;
      },

      resetGame: function() {
        this.isPlaying = false;
        
        this.startButton.setAttribute('visible', 'true');
        this.startButton.classList.add('clickable');
        
        this.resetButton.setAttribute('visible', 'false');
        this.resetButton.classList.remove('clickable');

        this.uiMessage.setAttribute('value', 'PRESS START');
        this.uiMessage.setAttribute('color', '#AAA');
        this.uiScore.setAttribute('value', 'Score: 0');
        this.uiLevel.setAttribute('value', 'Level: 1');

        this.targets.forEach(t => {
          t.el.setAttribute('visible', 'false');
          t.hitbox.classList.remove('clickable');
        });
        this.selectedTarget = null;
      },

      randomizeDir: function(tData) {
        tData.dir = Math.floor(Math.random() * 4);
        let rotZ = tData.dir === 0 ? 90 : tData.dir === 1 ? 0 : tData.dir === 2 ? 270 : 180;
        tData.landolt.setAttribute('rotation', `0 0 ${rotZ}`);
      },

      checkHit: function(inputDir) {
        let tData = this.selectedTarget;
        if(tData.dir === inputDir) {
          let isCombo = tData.isYellow;
          let pushBack = isCombo ? (8 + this.level * 2) : (4 + this.level * 1);
          
          tData.z = Math.max(-30, tData.z - pushBack);
          this.randomizeDir(tData);

          this.targets.forEach(t => {
            t.isYellow = false;
            t.stand.setAttribute('color', '#333333');
          });
          if(!isCombo) {
            tData.isYellow = true;
            tData.stand.setAttribute('color', '#aaaa00');
          }

          this.uiMessage.setAttribute('value', isCombo ? 'COMBO!!' : 'HIT!');
          this.uiMessage.setAttribute('color', isCombo ? '#FFD700' : '#00FF00');
          this.playSound(isCombo ? 'combo' : 'hit');

          let sorted = [...this.targets].sort((a,b) => b.z - a.z);
          if(tData === sorted[0] || tData === sorted[1]) {
            let distanceScore = Math.floor(Math.abs(tData.z));
            this.score += isCombo ? distanceScore * 2 : distanceScore;
          }

          this.hitCount++;
          if(this.hitCount >= 10) {
            this.level++;
            this.hitCount = 0;
          }
        } else {
          tData.isYellow = false;
          tData.stand.setAttribute('color', '#333333');
          this.uiMessage.setAttribute('value', 'MISS...');
          this.uiMessage.setAttribute('color', '#FF0000');
          this.playSound('miss');
        }
        
        this.updateUI();
        // 【修正2】位置の即時反映も軽量化
        tData.el.object3D.position.z = tData.z;
      },

      updateUI: function() {
        this.uiScore.setAttribute('value', `Score: ${this.score}`);
        this.uiLevel.setAttribute('value', `Level: ${this.level}`);
      },

      tick: function (time, timeDelta) {
        if (!this.isPlaying) return;

        // レベルに応じた移動速度（timeDeltaを使ってFPSのブレを吸収）
        let speed = (0.02 + this.level * 0.005) * (timeDelta / 16);
        let anyAtFront = false;

        this.targets.forEach(t => {
          t.z += speed;
          if(t.z >= -1.5) {
            t.z = -1.5;
            anyAtFront = true;
          }
          // 【修正2】重いsetAttributeを避け、object3Dのpositionを直接変更
          t.el.object3D.position.z = t.z;
        });

        // 【修正3】フレームレートに依存しないペナルティ処理（約1.5秒滞在でペナルティ）
        if(anyAtFront) {
          this.penaltyTimer += timeDelta;
          if(this.penaltyTimer > 1500 && this.level > 1) {
            this.level--;
            this.penaltyTimer = 0; // ペナルティ後にタイマーリセット
            this.updateUI();
          }
        } else {
          this.penaltyTimer = 0; // 前にいなければタイマーリセット
        }
      }
    });
  </script>
</head>
<body style="margin: 0; overflow: hidden; background-color: #000;">
  <a-scene game-manager background="color: #111">
    
    <a-entity position="0 0 0">
      <a-camera position="0 1.6 0">
        <a-entity cursor="rayOrigin: mouse; fuse: false" raycaster="objects: .clickable"></a-entity>
      </a-camera>
      <a-entity class="vr-controller" laser-controls="hand: left" raycaster="objects: .clickable; showLine: true"></a-entity>
      <a-entity class="vr-controller" laser-controls="hand: right" raycaster="objects: .clickable; showLine: true"></a-entity>
    </a-entity>

    <a-entity id="controls-panel" position="-3.5 2.5 -3" rotation="0 25 0" geometry="primitive: plane; width: 2.5; height: 2.2" material="color: #222; opacity: 0.8">
      <a-text value="[ HOW TO PLAY ]\n\n- PC -\nAim: Mouse\nInput: Arrow Keys\n\n- VR -\nAim: Laser Pointer\nInput: Thumbstick\n\n1. Aim at the target.\n2. Input the open direction\n   of the 'C' ring.\n3. Push it back!" 
              position="-1.1 0.8 0.01" align="left" color="#FFF" width="2.3" line-height="55"></a-text>
    </a-entity>

    <a-entity id="world-ui" position="0 3.5 -4">
      <a-text id="ui-score" value="Score: 0" position="-1.5 0 0" color="#FFD700" width="5"></a-text>
      <a-text id="ui-level" value="Level: 1" position="1.5 0 0" color="#FFF" width="5"></a-text>
      <a-text id="ui-message" value="PRESS START" position="0 -0.5 0" align="center" color="#AAA" width="6"></a-text>
    </a-entity>

    <a-entity id="start-button" class="clickable" position="0 1.5 -3" geometry="primitive: plane; width: 1.5; height: 0.6" material="color: #4CAF50">
      <a-text value="START" align="center" position="0 0 0.01" width="5" color="#FFF"></a-text>
    </a-entity>

    <a-entity id="reset-button" position="3.5 1.5 -3" rotation="0 -25 0" geometry="primitive: plane; width: 1.5; height: 0.6" material="color: #f44336" visible="false">
      <a-text value="RESET" align="center" position="0 0 0.01" width="5" color="#FFF"></a-text>
    </a-entity>

    <a-grid id="ground" width="10" height="40" src="https://cdn.aframe.io/a-painter/images/floor.jpg" position="0 0 -15" rotation="-90 0 0"></a-grid>
    <a-entity position="-2 0.01 -15" rotation="-90 0 0" geometry="primitive: plane; width: 0.1; height: 32" material="color: #555"></a-entity>
    <a-entity position="0 0.01 -15" rotation="-90 0 0" geometry="primitive: plane; width: 0.1; height: 32" material="color: #555"></a-entity>
    <a-entity position="2 0.01 -15" rotation="-90 0 0" geometry="primitive: plane; width: 0.1; height: 32" material="color: #555"></a-entity>

    <a-light type="ambient" color="#666"></a-light>
    <a-light type="point" intensity="0.5" position="0 4 0"></a-light>
  </a-scene>
</body>
</html>
